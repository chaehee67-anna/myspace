name: hee_lhm slot runner

on:
  schedule:
    - cron: '0 22 * * *'
    - cron: '30 0 * * *'
    - cron: '0 3 * * *'
    - cron: '0 6 * * *'
    - cron: '30 8 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      slot:
        description: '슬롯 번호 (1~6)'
        required: true
        default: '1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-slot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install anthropic requests pytz feedparser

      - name: 슬롯 번호 결정
        id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ github.event.inputs.slot }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(TZ="Asia/Seoul" date +"%H%M")
            if   [ "$HOUR" -ge "0700" ] && [ "$HOUR" -lt "0900" ]; then echo "number=1" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -ge "0900" ] && [ "$HOUR" -lt "1100" ]; then echo "number=2" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -ge "1100" ] && [ "$HOUR" -lt "1400" ]; then echo "number=3" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -ge "1400" ] && [ "$HOUR" -lt "1600" ]; then echo "number=4" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -ge "1600" ] && [ "$HOUR" -lt "1830" ]; then echo "number=5" >> $GITHUB_OUTPUT
            else echo "number=6" >> $GITHUB_OUTPUT
            fi
          fi

      - name: 스킬 파일 복원
        env:
          SKILL_CORE: ${{ secrets.SKILL_CORE }}
          SKILL_SLOT1: ${{ secrets.SKILL_SLOT1 }}
          SKILL_SLOT2: ${{ secrets.SKILL_SLOT2 }}
          SKILL_SLOT34: ${{ secrets.SKILL_SLOT34 }}
          SKILL_SLOT56: ${{ secrets.SKILL_SLOT56 }}
        run: |
          mkdir -p skills
          printf '%s' "$SKILL_CORE"  > skills/core.md
          printf '%s' "$SKILL_SLOT1" > skills/slot1.md
          printf '%s' "$SKILL_SLOT2" > skills/slot2.md
          printf '%s' "$SKILL_SLOT34" > skills/slot3-4.md
          printf '%s' "$SKILL_SLOT56" > skills/slot5-6.md

      - name: 슬롯 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run_slot.py --slot ${{ steps.slot.outputs.number }}

      - name: history.json 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --hard origin/main
          git add history/history.json
          git diff --staged --quiet || git commit -m "chore: update history [slot ${{ steps.slot.outputs.number }}]"
          git push
