name: hee_lhm slot runner

on:
  schedule:
    - cron: '0 22 * * *'
    - cron: '30 0 * * *'
    - cron: '0 3 * * *'
    - cron: '0 6 * * *'
    - cron: '30 8 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      slot:
        description: '슬롯 번호 (1~6)'
        required: true
        default: '1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-slot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install anthropic requests feedparser

      - name: 슬롯 번호 결정
        id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ github.event.inputs.slot }}" >> $GITHUB_OUTPUT
          else
            case "${{ github.event.schedule }}" in
              "0 22 * * *")  echo "number=1" >> $GITHUB_OUTPUT ;;
              "30 0 * * *")  echo "number=2" >> $GITHUB_OUTPUT ;;
              "0 3 * * *")   echo "number=3" >> $GITHUB_OUTPUT ;;
              "0 6 * * *")   echo "number=4" >> $GITHUB_OUTPUT ;;
              "30 8 * * *")  echo "number=5" >> $GITHUB_OUTPUT ;;
              "0 10 * * *")  echo "number=6" >> $GITHUB_OUTPUT ;;
              *)             echo "number=6" >> $GITHUB_OUTPUT ;;
            esac
          fi

      - name: 슬롯 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run_slot.py --slot ${{ steps.slot.outputs.number }}

      - name: history.json 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --hard origin/main
          git add history/history.json
          git diff --staged --quiet || git commit -m "chore: update history [slot ${{ steps.slot.outputs.number }}]"
          git push

      - name: 실패 알림
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ SLOT ${{ steps.slot.outputs.number }} 실패%0A$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M') KST%0Ahttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
